<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4A90D9">
    <title>우리가족 시간표</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-logo">&#128197;</div>
        <h1>우리가족 시간표</h1>
        <p class="login-subtitle">가족과 함께 아이들의 일정을 관리하세요</p>

        <div class="login-tabs">
            <button class="tab-btn active" onclick="showTab('join')">참여하기</button>
            <button class="tab-btn" onclick="showTab('create')">새로 만들기</button>
        </div>

        <div id="tab-join" class="tab-content active">
            <div class="form-group">
                <label>가족 코드</label>
                <input type="text" id="join-code" placeholder="6자리 코드 입력" maxlength="6"
                       style="text-transform: uppercase; text-align: center; font-size: 1.5rem; letter-spacing: 0.3rem;">
            </div>
            <button onclick="joinFamily()" class="btn btn-primary btn-full">참여하기</button>
        </div>

        <div id="tab-create" class="tab-content">
            <div class="form-group">
                <label>가족 이름</label>
                <input type="text" id="family-name" placeholder="예: 홍길동네 가족" value="우리 가족">
            </div>
            <button onclick="createFamily()" class="btn btn-primary btn-full">가족 만들기</button>
        </div>

        <div id="result-box" class="result-box hidden">
            <p id="result-message"></p>
            <div id="result-code" class="family-code"></div>
            <p class="code-hint">이 코드를 가족에게 공유하세요!</p>
            <button onclick="location.href='/'" class="btn btn-primary btn-full">시작하기</button>
        </div>
    </div>

    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            event.target.classList.add('active');
            document.getElementById('result-box').classList.add('hidden');
        }

        async function joinFamily() {
            const code = document.getElementById('join-code').value.trim();
            if (!code) return alert('코드를 입력해주세요.');
            const res = await fetch('/api/family/join', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({code})
            });
            const data = await res.json();
            if (data.success) {
                location.href = '/';
            } else {
                alert(data.error || '코드를 찾을 수 없습니다.');
            }
        }

        async function createFamily() {
            const name = document.getElementById('family-name').value.trim();
            const res = await fetch('/api/family/create', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name})
            });
            const data = await res.json();
            if (data.success) {
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById('result-box').classList.remove('hidden');
                document.getElementById('result-message').textContent = '가족이 생성되었습니다!';
                document.getElementById('result-code').textContent = data.code;
            }
        }

        document.getElementById('join-code').addEventListener('keypress', e => {
            if (e.key === 'Enter') joinFamily();
        });
    </script>
</body>
</html>
